services:
  - type: web
    name: agroNest-backend
    runtime: node
    rootDir: BACKEND
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.20.4
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
